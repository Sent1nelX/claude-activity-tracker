name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Import check
        run: |
          python3 -c "import src.db" 2>/dev/null || python3 -c "
          import sys; sys.path.insert(0, 'src')
          import db
          print('db.py OK')
          "

      - name: DB init test
        run: |
          python3 -c "
          import sys, tempfile
          from pathlib import Path
          sys.path.insert(0, 'src')
          import db
          with tempfile.TemporaryDirectory() as tmp:
              p = Path(tmp) / 'test.db'
              conn = db.init_db(p)
              db.start_session('test-uuid', project='/tmp', ts=1000000, db_path=p)
              db.end_session('test-uuid', ts=1000060, db_path=p)
              stats = db.get_stats(days=1, db_path=p)
              print('DB OK, sessions:', stats['total_sessions'])
          "

      - name: MCP server startup check
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            | timeout 5 python3 src/server.py | python3 -c "
          import sys, json
          resp = json.loads(sys.stdin.read().strip())
          assert resp.get('result', {}).get('serverInfo', {}).get('name') == 'claude-activity-tracker'
          print('MCP handshake OK')
          "

      - name: Bash hook syntax check
        run: |
          bash -n hooks/session_start.sh
          bash -n hooks/pre_tool_use.sh
          bash -n hooks/post_tool_use.sh
          bash -n hooks/session_end.sh
          echo "Hook syntax OK"

      - name: Install script syntax check
        run: bash -n install.sh && echo "install.sh syntax OK"
